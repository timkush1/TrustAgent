name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go (proxy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: truthtable
          POSTGRES_PASSWORD: ci-test
          POSTGRES_DB: truthtable
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U truthtable"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://truthtable:ci-test@localhost:5432/truthtable
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      # Generated stubs are gitignored; regenerate them for the build.
      - name: Generate gRPC stubs
        run: |
          protoc --proto_path=proto \
            --go_out=backend-go --go_opt=module=github.com/truthtable/backend-go \
            --go-grpc_out=backend-go --go-grpc_opt=module=github.com/truthtable/backend-go \
            proto/evaluator.proto

      - name: gofmt
        working-directory: backend-go
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files need gofmt:" && echo "$unformatted" && exit 1
          fi

      - name: go vet
        working-directory: backend-go
        run: go vet ./...

      - name: go test
        working-directory: backend-go
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        working-directory: backend-go
        run: go tool cover -func=coverage.out | tail -n 1

  python:
    name: Python (audit engine)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend-python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend-python/pyproject.toml

      # CPU-only torch keeps the install small and fast (the default PyPI
      # wheels bundle CUDA and weigh in at multiple GB).
      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package and dev tools
        run: |
          pip install .
          pip install pytest==7.4.4 pytest-asyncio==0.23.8 pytest-cov \
            ruff==0.1.15 black==23.12.1

      # Generated stubs are gitignored; regenerate them for the test run.
      - name: Generate gRPC stubs
        run: |
          python -m grpc_tools.protoc -I../proto \
            --python_out=src/truthtable/grpc/pb \
            --grpc_python_out=src/truthtable/grpc/pb \
            ../proto/evaluator.proto

      - name: ruff
        run: ruff check .

      - name: black
        run: black --check .

      - name: pytest (unit)
        run: pytest tests/unit -v --cov=truthtable --cov-report=term

      # Tier-1 eval regression gate: the golden set runs through the real
      # pipeline with recorded (mock) LLM responses; any change to parsing,
      # scoring, or thresholds that shifts results fails this step and forces
      # a deliberate baseline update in the same PR. See docs/EVALUATION.md.
      - name: Eval regression gate (golden set, mock provider)
        run: python -m evals.run_eval --dataset golden --provider mock --check-baseline

  frontend:
    name: Frontend (dashboard)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: eslint
        run: npm run lint

      - name: TypeScript
        run: npx tsc -b

      - name: vitest
        run: npm test

  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend-go/go.mod
          cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Images need the gitignored generated stubs in the build context.
      - name: Generate gRPC stubs
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          protoc --proto_path=proto \
            --go_out=backend-go --go_opt=module=github.com/truthtable/backend-go \
            --go-grpc_out=backend-go --go-grpc_opt=module=github.com/truthtable/backend-go \
            proto/evaluator.proto
          pip install grpcio-tools
          python -m grpc_tools.protoc -Iproto \
            --python_out=backend-python/src/truthtable/grpc/pb \
            --grpc_python_out=backend-python/src/truthtable/grpc/pb \
            proto/evaluator.proto

      - uses: docker/setup-buildx-action@v4

      - name: Build proxy image
        uses: docker/build-push-action@v7
        with:
          context: backend-go
          push: false
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,scope=proxy,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v7
        with:
          context: frontend-react
          push: false
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

      - name: Build audit-engine image
        uses: docker/build-push-action@v7
        with:
          context: backend-python
          push: false
          cache-from: type=gha,scope=engine
          cache-to: type=gha,scope=engine,mode=max
