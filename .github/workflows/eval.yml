name: Eval (benchmark)

# Tier-2 evaluation: runs the detector against HaluEval QA with a live model
# (Ollama in a service container). Slow and model-dependent by design — the
# fast deterministic gate lives in ci.yml. See docs/EVALUATION.md.

on:
  schedule:
    - cron: '0 5 * * 1' # weekly, Monday 05:00 UTC
  workflow_dispatch:
    inputs:
      samples:
        description: 'Total examples (half faithful, half hallucinated)'
        default: '50'
      model:
        description: 'Ollama model to use as the audit judge'
        default: 'llama3.2:1b'

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    env:
      SAMPLES: ${{ inputs.samples || '50' }}
      MODEL: ${{ inputs.model || 'llama3.2:1b' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend-python/pyproject.toml

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package
        working-directory: backend-python
        run: pip install .

      - name: Pull model
        run: |
          curl -sf http://localhost:11434/api/pull \
            -d "{\"name\": \"${MODEL}\"}" | tail -n 1

      - name: Download HaluEval sample
        working-directory: backend-python
        run: python -m evals.datasets.download halueval --samples "$SAMPLES" --seed 42

      - name: Run benchmark
        working-directory: backend-python
        run: |
          python -m evals.run_eval \
            --dataset halueval \
            --provider ollama \
            --model "$MODEL" \
            --ollama-url http://localhost:11434 \
            --output eval-report.json | tee eval-summary.txt

      - name: Publish summary
        working-directory: backend-python
        run: |
          {
            echo "## HaluEval benchmark (${MODEL}, ${SAMPLES} samples)"
            echo '```'
            cat eval-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: backend-python/eval-report.json
