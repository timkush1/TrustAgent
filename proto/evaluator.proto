syntax = "proto3";

package truthtable.audit.v1;

option go_package = "github.com/truthtable/backend-go/api/audit/v1;auditv1";
// Note: Python package is determined by output directory, not proto option

// AuditService provides hallucination detection for LLM responses
service AuditService {
    // SubmitAudit initiates async fact-checking of an LLM response
    // Returns immediately with audit_id for tracking
    rpc SubmitAudit(AuditRequest) returns (AuditSubmission);
    
    // GetAuditResult retrieves completed audit (polling method)
    rpc GetAuditResult(AuditResultRequest) returns (AuditResult);
    
    // HealthCheck verifies service readiness
    rpc HealthCheck(HealthRequest) returns (HealthResponse);

    // IngestDocuments adds documents to the RAG knowledge base.
    // Documents are decomposed into atomic claims; each claim must pass the
    // Gate-1 entailment check against its own source to be admitted
    // (below-threshold claims are stored as quarantined and excluded from
    // retrieval). Accepted claims are checked for contradictions against
    // existing knowledge.
    rpc IngestDocuments(IngestRequest) returns (IngestResponse);

    // ListKBClaims pages through stored knowledge-base claims.
    rpc ListKBClaims(ListKBClaimsRequest) returns (ListKBClaimsResponse);

    // ListConflicts returns contradiction pairs detected at ingest time.
    rpc ListConflicts(ListConflictsRequest) returns (ListConflictsResponse);

    // GetKBStats returns knowledge-base counters.
    rpc GetKBStats(KBStatsRequest) returns (KBStatsResponse);
}

// ========== Request Messages ==========

message AuditRequest {
    string request_id = 1;          // UUID for tracing (from proxy)
    string query = 2;               // Original user question
    string response = 3;            // LLM-generated answer to verify
    repeated ContextDocument context = 4;  // RAG retrieved documents
    string model = 5;               // LLM model used (e.g., "gpt-4")
    string provider = 6;            // LLM provider (e.g., "openai")
    int64 timestamp_ms = 7;         // Request timestamp
    map<string, string> metadata = 8;  // Additional context
}

message ContextDocument {
    string id = 1;                  // Document/chunk identifier
    string content = 2;             // Retrieved text content
    map<string, string> metadata = 3;  // Source, score, etc.
    float relevance_score = 4;      // RAG retrieval score (0.0-1.0)
}

message AuditResultRequest {
    string audit_id = 1;            // Audit identifier to retrieve
}

message HealthRequest {}

// ========== Response Messages ==========

message AuditSubmission {
    string audit_id = 1;            // UUID for tracking this audit
    string status = 2;              // "queued" | "processing" | "completed"
    int32 queue_position = 3;       // Position in processing queue
}

message AuditResult {
    string audit_id = 1;            // Matches request audit_id
    string request_id = 2;          // Original request_id from AuditRequest
    AuditStatus status = 3;         // Processing status

    // Trust Score (0.0 - 1.0, where 1.0 = fully faithful)
    float faithfulness_score = 4;
    TrustGrade grade = 5;           // A/B/C/D/F classification

    // Detailed verification results
    repeated ClaimVerification claims = 6;

    // Metadata
    string reasoning_trace = 7;     // LLM reasoning for transparency
    int64 completed_at_ms = 8;      // Completion timestamp
    int64 processing_time_ms = 9;   // Total processing duration

    // Hallucination detection result from scorer
    bool hallucination_detected = 10;

    // Per-step timing from LangGraph pipeline (e.g., "decompose_ms": 150)
    map<string, int64> step_timings = 11;
}

message ClaimVerification {
    string claim = 1;               // Atomic statement extracted from response
    VerificationStatus status = 2;  // Verification outcome
    float confidence = 3;           // Confidence in verification (0.0-1.0)
    repeated string evidence = 4;   // Supporting context snippets
}

message HealthResponse {
    bool healthy = 1;               // Overall service health
    string version = 2;             // Service version
    map<string, bool> dependencies = 3;  // Qdrant, Ollama, Redis status
}

message IngestRequest {
    repeated ContextDocument documents = 1;  // Documents to add to knowledge base
}

message IngestResponse {
    int32 documents_ingested = 1;   // Number of documents successfully ingested
    string status = 2;              // "success" or error message

    // Claim-level ingestion results (VERITAS-lite, see docs/KB-DESIGN.md)
    repeated ClaimIngestResult claim_results = 3;
    int32 claims_accepted = 4;      // Passed the Gate-1 entailment check
    int32 claims_quarantined = 5;   // Failed Gate-1; stored but not retrievable
    int32 conflicts_detected = 6;   // CONTRADICTS pairs found during this ingest
}

// ========== Knowledge Base (VERITAS-lite) ==========

message ClaimIngestResult {
    string claim_id = 1;            // Stable id of the stored claim
    string claim = 2;               // Atomic claim text
    string source_doc_id = 3;       // Document the claim was extracted from
    KBClaimStatus status = 4;       // ACCEPTED or QUARANTINED
    float entailment_score = 5;     // Gate-1 confidence that source entails claim
    repeated string conflicts_with = 6;  // claim_ids this claim contradicts
}

message KBClaim {
    string claim_id = 1;
    string claim = 2;
    string source_doc_id = 3;
    string source_excerpt = 4;      // Span of the source the claim came from
    KBClaimStatus status = 5;
    float entailment_score = 6;
    repeated string conflicts_with = 7;
    int64 ingested_at_ms = 8;
}

message ListKBClaimsRequest {
    int32 limit = 1;                // Default 50, max 200
    int32 offset = 2;
    KBClaimStatus status_filter = 3;  // UNSPECIFIED = all
}

message ListKBClaimsResponse {
    repeated KBClaim claims = 1;
    int32 total = 2;
}

message ListConflictsRequest {
    int32 limit = 1;                // Default 50, max 200
}

message ConflictPair {
    KBClaim claim_a = 1;
    KBClaim claim_b = 2;
}

message ListConflictsResponse {
    repeated ConflictPair conflicts = 1;
    int32 total = 2;
}

message KBStatsRequest {}

message KBStatsResponse {
    int32 total_claims = 1;
    int32 accepted = 2;
    int32 quarantined = 3;
    int32 conflict_pairs = 4;
}

enum KBClaimStatus {
    KB_CLAIM_STATUS_UNSPECIFIED = 0;
    KB_CLAIM_STATUS_ACCEPTED = 1;
    KB_CLAIM_STATUS_QUARANTINED = 2;
}

// ========== Enums ==========

enum AuditStatus {
    AUDIT_STATUS_UNSPECIFIED = 0;
    AUDIT_STATUS_QUEUED = 1;
    AUDIT_STATUS_PROCESSING = 2;
    AUDIT_STATUS_COMPLETED = 3;
    AUDIT_STATUS_FAILED = 4;
}

enum VerificationStatus {
    VERIFICATION_STATUS_UNSPECIFIED = 0;
    VERIFICATION_STATUS_SUPPORTED = 1;        // Entailed by context
    VERIFICATION_STATUS_CONTRADICTED = 2;     // Conflicts with context
    VERIFICATION_STATUS_UNSUPPORTED = 3;      // No evidence in context
    VERIFICATION_STATUS_PARTIALLY_SUPPORTED = 4;  // Some evidence exists
}

enum TrustGrade {
    TRUST_GRADE_UNSPECIFIED = 0;
    TRUST_GRADE_A = 1;  // 90-100% faithful
    TRUST_GRADE_B = 2;  // 75-89% faithful
    TRUST_GRADE_C = 3;  // 60-74% faithful
    TRUST_GRADE_D = 4;  // 40-59% faithful
    TRUST_GRADE_F = 5;  // 0-39% faithful
}
