global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'truthtable'
    environment: 'development'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Each app job lists two targets: the Docker-network hostname (all-Docker
  # mode) and host.docker.internal (hybrid mode, app running natively on the
  # host). Whichever is alive gets scraped; the other just shows as down.
  - job_name: 'go-proxy'
    static_configs:
      - targets: ['proxy:8002', 'host.docker.internal:8002']
    metrics_path: '/metrics'

  - job_name: 'python-audit-engine'
    static_configs:
      - targets: ['audit-engine:8001', 'host.docker.internal:8001']
    metrics_path: '/metrics'
